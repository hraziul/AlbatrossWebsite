<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Album — Views — Albatross A/Maze</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=IBM+Plex+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#050505;color:#fff;font-family:'IBM Plex Mono',monospace;min-height:100vh;}
a{color:inherit;text-decoration:none;}

nav{position:fixed;top:0;width:100%;z-index:999;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 28px;background:linear-gradient(to bottom,rgba(5,5,5,.97),rgba(5,5,5,.6));border-bottom:1px solid rgba(0,243,255,.18);box-sizing:border-box;}
.nav-back{font-size:.72rem;color:rgba(255,255,255,.9);font-weight:600;transition:color .2s;}
.nav-back:hover{color:#00f3ff;}
.nav-logo{font-size:.78rem;letter-spacing:.4em;color:#00f3ff;justify-self:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-cta{justify-self:end;font-size:.72rem;background:#00f3ff;color:#050505;padding:7px 18px;font-weight:700;transition:background .2s;}
.nav-cta:hover{background:#fff;}
@media(max-width:768px){nav{grid-template-columns:1fr auto;padding:10px 16px;}.nav-logo{display:none;}.nav-cta{font-size:.65rem;padding:6px 12px;}}

body{padding-top:70px;}

.album-hero{padding:60px 5% 40px;max-width:1200px;margin:0 auto;border-bottom:1px solid rgba(255,255,255,.06);}
.album-label{font-size:.62rem;letter-spacing:.4em;color:#00f3ff;margin-bottom:.6rem;}
.album-title{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:clamp(2.2rem,6vw,4.5rem);color:#fff;line-height:.9;margin-bottom:.8rem;}
.album-subtitle{font-size:.8rem;color:rgba(255,255,255,.45);margin-bottom:.5rem;}
.album-meta{font-size:.62rem;color:rgba(255,255,255,.2);letter-spacing:.12em;}
.back-link{display:inline-block;font-size:.68rem;color:rgba(0,243,255,.6);margin-top:1.2rem;transition:color .2s;}
.back-link:hover{color:#00f3ff;}

/* Masonry grid */
.masonry-wrap{max-width:1200px;margin:0 auto;padding:40px 5% 100px;}
.masonry{columns:3;column-gap:3px;}
@media(max-width:900px){.masonry{columns:2;}}
@media(max-width:480px){.masonry{columns:1;}}
.masonry-item{break-inside:avoid;margin-bottom:3px;cursor:pointer;overflow:hidden;position:relative;}
.masonry-item img{display:block;width:100%;transition:transform .4s ease,opacity .3s ease;opacity:.9;}
.masonry-item:hover img{transform:scale(1.02);opacity:1;}
.masonry-item::after{content:'';position:absolute;inset:0;background:rgba(5,5,5,0);transition:background .3s;}
.masonry-item:hover::after{background:rgba(5,5,5,.1);}

/* Empty state */
.empty-state{padding:80px 5%;text-align:center;color:rgba(255,255,255,.2);}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.3;}
.empty-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.2rem;color:rgba(255,255,255,.25);margin-bottom:.6rem;}
.empty-text{font-size:.72rem;line-height:2;}

/* Lightbox */
.lightbox{position:fixed;inset:0;z-index:9999;background:rgba(3,3,3,.97);display:none;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox-img{max-width:90vw;max-height:88vh;object-fit:contain;user-select:none;}
.lightbox-close{position:absolute;top:20px;right:24px;font-size:1.6rem;color:rgba(255,255,255,.5);cursor:pointer;background:none;border:none;font-family:'IBM Plex Mono',monospace;transition:color .2s;}
.lightbox-close:hover{color:#fff;}
.lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.35);font-size:1.8rem;cursor:pointer;padding:20px;transition:color .2s;font-family:'IBM Plex Mono',monospace;}
.lightbox-prev{left:10px;}
.lightbox-next{right:10px;}
.lightbox-prev:hover,.lightbox-next:hover{color:#fff;}
.lightbox-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:.65rem;color:rgba(255,255,255,.3);letter-spacing:.2em;}

.error-state{padding:100px 5%;text-align:center;}
.error-state h1{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:2rem;color:rgba(255,255,255,.3);margin-bottom:1rem;}
.error-state a{color:#00f3ff;font-size:.8rem;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-back" id="navBack">&#8592; Back to Views</a>
  <div class="nav-logo" id="navTitle">VIEWS</div>
  <a href="mailto:hraziul@gmail.com?subject=Brief%20Me&body=Hi%20Raziul%2C%0A%0AI%20came%20across%20your%20work%20and%20wanted%20to%20reach%20out..." class="nav-cta">Brief Me &#8594;</a>
</nav>

<div id="heroWrap"></div>
<div id="galleryWrap"></div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lbClose" aria-label="Close">&#10005;</button>
  <button class="lightbox-prev" id="lbPrev" aria-label="Previous">&#8592;</button>
  <img class="lightbox-img" id="lbImg" src="" alt="">
  <button class="lightbox-next" id="lbNext" aria-label="Next">&#8594;</button>
  <div class="lightbox-counter" id="lbCounter"></div>
</div>

<script>
const MAILTO = 'mailto:hraziul@gmail.com?subject=Brief%20Me&body=Hi%20Raziul%2C%0A%0AI%20came%20across%20your%20work%20and%20wanted%20to%20reach%20out...';
document.querySelectorAll('.nav-cta').forEach(el => el.href = MAILTO);

const slug = new URLSearchParams(window.location.search).get('album');
if (!slug) {
  document.getElementById('heroWrap').innerHTML = '<div class="error-state"><h1>No album specified.</h1><a href="index.html">&#8592; Back to Views</a></div>';
} else {
  fetch('albums.json')
    .then(r => r.json())
    .then(data => {
      const album = data.albums.find(a => a.slug === slug);
      if (!album) {
        document.getElementById('heroWrap').innerHTML = '<div class="error-state"><h1>Album not found.</h1><a href="index.html">&#8592; Back to Views</a></div>';
        return;
      }
      document.title = album.title + ' — Views — Albatross A/Maze';
      document.getElementById('navTitle').textContent = album.title.toUpperCase();

      document.getElementById('heroWrap').innerHTML = `
        <div class="album-hero">
          <div class="album-label">${album.category.toUpperCase()} &mdash; ALBATROSS A/MAZE</div>
          <div class="album-title">${album.title}</div>
          <div class="album-subtitle">${album.subtitle}</div>
          <div class="album-meta">${album.photos.length > 0 ? album.photos.length + ' PHOTOGRAPHS' : 'PHOTOGRAPHS'}</div>
          <a href="index.html" class="back-link">&#8592; Back to Views</a>
        </div>
      `;

      const wrap = document.getElementById('galleryWrap');
      if (!album.photos || album.photos.length === 0) {
        wrap.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">&#9634;</div>
            <div class="empty-title">Coming Soon</div>
            <div class="empty-text">This album is being prepared.<br>Check back shortly.</div>
          </div>`;
        return;
      }

      const masonry = document.createElement('div');
      masonry.className = 'masonry-wrap';
      const grid = document.createElement('div');
      grid.className = 'masonry';
      album.photos.forEach((src, i) => {
        const item = document.createElement('div');
        item.className = 'masonry-item';
        item.dataset.index = i;
        const img = document.createElement('img');
        img.src = src;
        img.alt = album.title + ' ' + (i + 1);
        img.loading = 'lazy';
        item.appendChild(img);
        item.addEventListener('click', () => openLightbox(i, album.photos));
        grid.appendChild(item);
      });
      masonry.appendChild(grid);
      wrap.appendChild(masonry);
    });
}

// Lightbox
let lbPhotos = [];
let lbIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCounter = document.getElementById('lbCounter');

function openLightbox(i, photos) {
  lbPhotos = photos;
  lbIndex = i;
  lbImg.src = photos[i];
  lbCounter.textContent = (i + 1) + ' / ' + photos.length;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}
function lbMove(dir) {
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  lbImg.src = lbPhotos[lbIndex];
  lbCounter.textContent = (lbIndex + 1) + ' / ' + lbPhotos.length;
}
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => lbMove(-1));
document.getElementById('lbNext').addEventListener('click', () => lbMove(1));
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbMove(-1);
  if (e.key === 'ArrowRight') lbMove(1);
});
</script>
</body>
</html>
