      if(!l.trim()) return '<span class="blank"></span>';
      if(l.startsWith('xxx') || l.startsWith('---')) return `<div class="p-divider">· · ·</div>`;
      return `<span class="line">${l}</span>`;
    }).join('');
  }
  const tags = (p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');

  // Prev / next
  const idx = POSTS.indexOf(p);
  const prev = POSTS[idx+1];
  const next = POSTS[idx-1];
  const navHtml = `<div class="nav-posts">
    ${prev?`<a href="post.html?slug=${prev.slug}">← ${prev.title}</a>`:'<span></span>'}
    ${next?`<a href="post.html?slug=${next.slug}" style="text-align:right">${next.title} →</a>`:'<span></span>'}
  </div>`;

  document.getElementById('post-content').innerHTML = `
    <div class="p-cat" style="color:${cc}">${p.category.toUpperCase()}</div>
    <h1 class="p-title">${p.title}</h1>
    <div class="p-date">${p.date}</div>
    <div class="p-excerpt">"${p.excerpt}"</div>
    <div class="p-body">${body}</div>
    <div class="tags-row">${tags}</div>
    ${navHtml}
  `;
  document.title = p.title + ' — Albatross A/Maze';
}

const slug = getParam('slug');
const post = POSTS.find(p => p.slug === slug);
if(post) render(post);
else document.getElementById('post-content').innerHTML = '<p style="color:rgba(255,255,255,.4)">Post not found.</p>';
</script>
</body></html>
